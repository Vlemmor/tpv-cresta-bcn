<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Cresta BCN | Menú Visual</title>

    <!-- Google Fonts: Outfit (Consistent with TPV) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- OVERLAYS COMUNES -->
    <header class="menu-header">
        <div class="header-content">
            <h1 class="logo">La Cresta BCN</h1>
            <div class="lang-selector">
                <img src="https://flagcdn.com/w20/es.png" alt="ES">
            </div>
        </div>
        <nav class="categories-nav" id="categories-nav">
            <!-- Dinámico -->
        </nav>
    </header>

    <!-- CONTENEDOR DE REELS -->
    <main class="reels-container" id="reels-container">
        <!-- Los platos se inyectarán aquí como secciones de scroll-snap -->
        <div class="loading-state">
            <div class="spinner"></div>
            <p>Preparando la experiencia visual...</p>
        </div>
    </main>

    <!-- CTA FOOTER (RESERVAS) -->
    <footer class="menu-footer">
        <button class="cta-booking"
            onclick="window.open('https://wa.me/34XXXXXXXXX?text=Hola!%20Quisiera%20reservar%20una%20mesa%20en%20La%20Cresta', '_blank')">
            <i class="ti ti-brand-whatsapp"></i> Reserve ahora
        </button>
    </footer>

    <!-- SCRIPTS -->
    <script src="../menu_data.js"></script>
    <script src="main.js"></script>
</body>

</html>
